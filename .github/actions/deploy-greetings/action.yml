name: Deploy greetings app
description: Stop old app and start python-greetings with pm2

inputs:
  working-directory:
    description: Directory where python-greetings repo is checked out
    required: true
  env-name:
    description: Environment name
    required: true
  port:
    description: App port
    required: true

runs:
  using: composite
  steps:
    - name: Print deploy stage
      shell: bash
      run: echo "Deploying application to ${{ inputs.env-name }} environment..."

    - name: Stop old service
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: |
        pm2 delete greetings-app-${{ inputs.env-name }} || true

    - name: Start app
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: |
        pm2 start app.py --name greetings-app-${{ inputs.env-name }} --interpreter ./venv/bin/python -- --port ${{ inputs.port }}
