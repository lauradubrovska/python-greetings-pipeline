name: Install Python dependencies
description: Create venv and install python-greetings dependencies

inputs:
  working-directory:
    description: Directory where python-greetings repo is checked out
    required: true

runs:
  using: composite
  steps:
    - name: Print install stage
      shell: bash
      run: echo "Installing all required dependencies..."

    - name: Create venv and install deps
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: |
        python3 -m venv venv
        ./venv/bin/python -m pip install -r requirements.txt
