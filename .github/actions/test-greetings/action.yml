name: Test greetings app
description: Run API tests against selected environment

inputs:
  env-name:
    description: Environment name
    required: true
  base-url:
    description: Base URL for API
    required: true
  repo-path:
    description: Path where test repo will be checked out
    required: true

runs:
  using: composite
  steps:
    - name: Checkout test repo
      uses: actions/checkout@v4
      with:
        repository: mtararujs/course-js-api-framework
        path: ${{ inputs.repo-path }}

    - name: Prepare local npm cache
      shell: bash
      working-directory: ${{ inputs.repo-path }}
      run: |
        mkdir -p .npm-cache

    - name: Install npm dependencies
      shell: bash
      working-directory: ${{ inputs.repo-path }}
      env:
        npm_config_cache: ${{ github.workspace }}/${{ inputs.repo-path }}/.npm-cache
      run: |
        echo "Running tests on ${{ inputs.env-name }} environment..."
        npm install

    - name: Run API tests
      shell: bash
      working-directory: ${{ inputs.repo-path }}
      env:
        BASE_URL: ${{ inputs.base-url }}
        npm_config_cache: ${{ github.workspace }}/${{ inputs.repo-path }}/.npm-cache
      run: |
        npm run greetings -- greetings_${{ inputs.env-name }}
