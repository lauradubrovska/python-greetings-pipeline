name: Python Greetings Pipeline

on:
  push:

jobs:
  install-pip-deps:
    runs-on: self-hosted

    steps:
      - name: Installing dependencies
        run: echo "Installing all required dependencies..."

      - name: Checkout pipeline repo
        uses: actions/checkout@v4

      - name: Checkout python-greetings repo
        uses: actions/checkout@v4
        with:
          repository: mtararujs/python-greetings
          path: python-greetings

      - name: Setup Python env
        working-directory: python-greetings
        run: |
          python3 -m venv venv
          ./venv/bin/python -m pip install -r requirements.txt

  deploy-to-dev:
    runs-on: self-hosted
    needs: install-pip-deps

    steps:
      - name: Deploying to DEV
        run: echo "Deploying to DEV..."

      - name: Checkout pipeline repo
        uses: actions/checkout@v4

      - name: Checkout python-greetings repo
        uses: actions/checkout@v4
        with:
          repository: mtararujs/python-greetings
          path: python-greetings

      - name: Setup Python env
        working-directory: python-greetings
        run: |
          python3 -m venv venv
          ./venv/bin/python -m pip install -r requirements.txt

      - name: Stop old DEV app
        working-directory: python-greetings
        run: |
          pm2 delete greetings-app-dev || true

      - name: Start DEV app
        working-directory: python-greetings
        run: |
          pm2 start app.py --name greetings-app-dev --interpreter ./venv/bin/python -- --port 7001

  tests-on-dev:
    runs-on: self-hosted
    needs: deploy-to-dev

    steps:
      - name: Testing DEV
        run: echo "Running tests on DEV..."

      - name: Checkout pipeline repo
        uses: actions/checkout@v4

      - name: Checkout test repo
        uses: actions/checkout@v4
        with:
          repository: mtararujs/course-js-api-framework
          path: tests

      - name: Install npm deps
        working-directory: tests
        run: |
          npm install

      - name: Run DEV tests
        working-directory: tests
        run: |
          npm run greetings greetings_dev
