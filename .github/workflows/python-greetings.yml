name: Python Greetings Pipeline

on:
  push:
  workflow_dispatch:

jobs:
  install-pip-deps:
    runs-on: self-hosted

    steps:
      - name: Checkout pipeline repo
        uses: actions/checkout@v4

      - name: Checkout python-greetings repo
        uses: actions/checkout@v4
        with:
          repository: mtararujs/python-greetings
          path: python-greetings

      - name: Install pip dependencies
        uses: ./.github/actions/install-python
        with:
          working-directory: python-greetings

  deploy-to-dev:
    runs-on: self-hosted
    needs: install-pip-deps

    steps:
      - name: Checkout pipeline repo
        uses: actions/checkout@v4

      - name: Checkout python-greetings repo
        uses: actions/checkout@v4
        with:
          repository: mtararujs/python-greetings
          path: python-greetings

      - name: Deploy to dev
        uses: ./.github/actions/deploy-greetings
        with:
          working-directory: python-greetings
          env-name: dev
          port: 7001

  tests-on-dev:
    runs-on: self-hosted
    needs: deploy-to-dev

    steps:
      - name: Checkout pipeline repo
        uses: actions/checkout@v4

      - name: Checkout test repo
        uses: actions/checkout@v4
        with:
          repository: mtararujs/course-js-api-framework
          path: tests

      - name: Test dev
        uses: ./.github/actions/test-greetings
        with:
          working-directory: tests
          env-name: dev
          base-url: http://localhost:7001

  deploy-to-stg:
    runs-on: self-hosted
    needs: tests-on-dev

    steps:
      - name: Checkout pipeline repo
        uses: actions/checkout@v4

      - name: Checkout python-greetings repo
        uses: actions/checkout@v4
        with:
          repository: mtararujs/python-greetings
          path: python-greetings

      - name: Deploy to stg
        uses: ./.github/actions/deploy-greetings
        with:
          working-directory: python-greetings
          env-name: stg
          port: 7002

  tests-on-stg:
    runs-on: self-hosted
    needs: deploy-to-stg

    steps:
      - name: Checkout pipeline repo
        uses: actions/checkout@v4

      - name: Checkout test repo
        uses: actions/checkout@v4
        with:
          repository: mtararujs/course-js-api-framework
          path: tests

      - name: Test stg
        uses: ./.github/actions/test-greetings
        with:
          working-directory: tests
          env-name: stg
          base-url: http://localhost:7002

  deploy-to-preprod:
    runs-on: self-hosted
    needs: tests-on-stg

    steps:
      - name: Checkout pipeline repo
        uses: actions/checkout@v4

      - name: Checkout python-greetings repo
        uses: actions/checkout@v4
        with:
          repository: mtararujs/python-greetings
          path: python-greetings

      - name: Deploy to preprod
        uses: ./.github/actions/deploy-greetings
        with:
          working-directory: python-greetings
          env-name: preprod
          port: 7003

  tests-on-preprod:
    runs-on: self-hosted
    needs: deploy-to-preprod

    steps:
      - name: Checkout pipeline repo
        uses: actions/checkout@v4

      - name: Checkout test repo
        uses: actions/checkout@v4
        with:
          repository: mtararujs/course-js-api-framework
          path: tests

      - name: Test preprod
        uses: ./.github/actions/test-greetings
        with:
          working-directory: tests
          env-name: preprod
          base-url: http://localhost:7003

  deploy-to-prod:
    runs-on: self-hosted
    needs: tests-on-preprod

    steps:
      - name: Checkout pipeline repo
        uses: actions/checkout@v4

      - name: Checkout python-greetings repo
        uses: actions/checkout@v4
        with:
          repository: mtararujs/python-greetings
          path: python-greetings

      - name: Deploy to prod
        uses: ./.github/actions/deploy-greetings
        with:
          working-directory: python-greetings
          env-name: prod
          port: 7004

  tests-on-prod:
    runs-on: self-hosted
    needs: deploy-to-prod

    steps:
      - name: Checkout pipeline repo
        uses: actions/checkout@v4

      - name: Checkout test repo
        uses: actions/checkout@v4
        with:
          repository: mtararujs/course-js-api-framework
          path: tests

      - name: Test prod
        uses: ./.github/actions/test-greetings
        with:
          working-directory: tests
          env-name: prod
          base-url: http://localhost:7004
