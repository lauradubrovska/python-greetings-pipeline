name: Python Greetings Pipeline

on:
  push:

jobs:
  install-pip-deps:
    runs-on: self-hosted

    steps:
      - name: Checkout pipeline repo
        uses: actions/checkout@v6
        with:
          path: main

      - name: Checkout python-greetings repo
        uses: actions/checkout@v6
        with:
          repository: mtararujs/python-greetings
          path: python-greetings

      - name: Install pip dependencies
        uses: ./main/.github/actions/install-python
        with:
          working-directory: python-greetings

  deploy-to-dev:
    runs-on: self-hosted
    needs: install-pip-deps

    steps:
      - name: Checkout pipeline repo
        uses: actions/checkout@v6
        with:
          path: main

      - name: Checkout python-greetings repo
        uses: actions/checkout@v6
        with:
          repository: mtararujs/python-greetings
          path: python-greetings-dev

      - name: Install pip dependencies for dev
        uses: ./main/.github/actions/install-python
        with:
          working-directory: python-greetings-dev

      - name: Deploy to dev
        uses: ./main/.github/actions/deploy-greetings
        with:
          working-directory: python-greetings-dev
          env-name: dev
          port: 7001

  tests-on-dev:
    runs-on: self-hosted
    needs: deploy-to-dev

    steps:
      - name: Checkout pipeline repo
        uses: actions/checkout@v6
        with:
          path: main

      - name: Checkout test repo
        uses: actions/checkout@v6
        with:
          repository: mtararujs/course-js-api-framework
          path: tests-dev

      - name: Test dev
        uses: ./main/.github/actions/test-greetings
        with:
          working-directory: tests-dev
          env-name: dev
          base-url: http://localhost:7001

  deploy-to-stg:
    runs-on: self-hosted
    needs: tests-on-dev

    steps:
      - name: Checkout pipeline repo
        uses: actions/checkout@v6
        with:
          path: main

      - name: Checkout python-greetings repo
        uses: actions/checkout@v6
        with:
          repository: mtararujs/python-greetings
          path: python-greetings-stg

      - name: Install pip dependencies for stg
        uses: ./main/.github/actions/install-python
        with:
          working-directory: python-greetings-stg

      - name: Deploy to stg
        uses: ./main/.github/actions/deploy-greetings
        with:
          working-directory: python-greetings-stg
          env-name: stg
          port: 7002

  tests-on-stg:
    runs-on: self-hosted
    needs: deploy-to-stg

    steps:
      - name: Checkout pipeline repo
        uses: actions/checkout@v6
        with:
          path: main

      - name: Checkout test repo
        uses: actions/checkout@v6
        with:
          repository: mtararujs/course-js-api-framework
          path: tests-stg

      - name: Test stg
        uses: ./main/.github/actions/test-greetings
        with:
          working-directory: tests-stg
          env-name: stg
          base-url: http://localhost:7002

  deploy-to-preprod:
    runs-on: self-hosted
    needs: tests-on-stg

    steps:
      - name: Checkout pipeline repo
        uses: actions/checkout@v6
        with:
          path: main

      - name: Checkout python-greetings repo
        uses: actions/checkout@v6
        with:
          repository: mtararujs/python-greetings
          path: python-greetings-preprod

      - name: Install pip dependencies for preprod
        uses: ./main/.github/actions/install-python
        with:
          working-directory: python-greetings-preprod

      - name: Deploy to preprod
        uses: ./main/.github/actions/deploy-greetings
        with:
          working-directory: python-greetings-preprod
          env-name: preprod
          port: 7003

  tests-on-preprod:
    runs-on: self-hosted
    needs: deploy-to-preprod

    steps:
      - name: Checkout pipeline repo
        uses: actions/checkout@v6
        with:
          path: main

      - name: Checkout test repo
        uses: actions/checkout@v6
        with:
          repository: mtararujs/course-js-api-framework
          path: tests-preprod

      - name: Test preprod
        uses: ./main/.github/actions/test-greetings
        with:
          working-directory: tests-preprod
          env-name: preprod
          base-url: http://localhost:7003

  deploy-to-prod:
    runs-on: self-hosted
    needs: tests-on-preprod

    steps:
      - name: Checkout pipeline repo
        uses: actions/checkout@v6
        with:
          path: main

      - name: Checkout python-greetings repo
        uses: actions/checkout@v6
        with:
          repository: mtararujs/python-greetings
          path: python-greetings-prod

      - name: Install pip dependencies for prod
        uses: ./main/.github/actions/install-python
        with:
          working-directory: python-greetings-prod

      - name: Deploy to prod
        uses: ./main/.github/actions/deploy-greetings
        with:
          working-directory: python-greetings-prod
          env-name: prod
          port: 7004

  tests-on-prod:
    runs-on: self-hosted
    needs: deploy-to-prod

    steps:
      - name: Checkout pipeline repo
        uses: actions/checkout@v6
        with:
          path: main

      - name: Checkout test repo
        uses: actions/checkout@v6
        with:
          repository: mtararujs/course-js-api-framework
          path: tests-prod

      - name: Test prod
        uses: ./main/.github/actions/test-greetings
        with:
          working-directory: tests-prod
          env-name: prod
          base-url: http://localhost:7004
